<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rounded-clip">
      <rect x="0" y="0" width="600" height="400" rx="20" ry="20" />
    </clipPath>
  </defs>

  <g clip-path="url(#rounded-clip)">

    <rect x="0" y="0" width="600" height="80" fill="#4A90E2" />
    <text x="300" y="50" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">Titolo Principale</text>

    <rect x="0" y="80" width="200" height="320" fill="#FF6B6B" />
    <text x="100" y="240" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">Sezione 1</text>

    <rect x="200" y="80" width="200" height="320" fill="#4ECDC4" >
    <text x="100" y="240" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">Sezione 2</text>
    </rect>
    <rect x="400" y="80" width="200" height="320" fill="#FFE66D" />
    <text x="500" y="240" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">Sezione 3</text>
    
    <line x1="0" y1="80" x2="600" y2="80" stroke="white" stroke-width="5" opacity="1" />
    <line x1="200" y1="80" x2="200" y2="400" stroke="white" stroke-width="5" opacity="1" />
    <line x1="400" y1="80" x2="400" y2="400" stroke="white" stroke-width="5" opacity="1" />
  </g>

  <rect x="0" y="0" width="600" height="400" rx="20" ry="20" fill="none" stroke="#333" stroke-width="2" />
</svg>
